# Builds the memento-stub native binary for all supported platforms and
# uploads the artefacts to the rolling pre-release "dev-latest".
#
# Trigger: push on branch "dev" where integrations/zed/stub/Cargo.toml
#          was modified (i.e. only on a version bump, not on every push).
#
# The workflow compiles the stub for all 5 supported targets and then
# creates (or updates) the "dev-latest" pre-release with the new binaries.
#
# This mirrors zed-stub-release.yml but targets the dev channel instead of
# a versioned GitHub Release.

name: Zed Stub Dev

on:
  push:
    branches:
      - dev
    paths:
      - "integrations/zed/stub/Cargo.toml"

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Matrix build — one job per target platform
# ---------------------------------------------------------------------------
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ────────────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: memento-stub-x86_64-pc-windows-msvc.exe
            exe_suffix: .exe
            use_cross: false

          # ── macOS Intel ────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: memento-stub-x86_64-apple-darwin
            exe_suffix: ""
            use_cross: false

          # ── macOS Apple Silicon ────────────────────────────────────────────
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: memento-stub-aarch64-apple-darwin
            exe_suffix: ""
            use_cross: false

          # ── Linux x86_64 ───────────────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: memento-stub-x86_64-unknown-linux-gnu
            exe_suffix: ""
            use_cross: false

          # ── Linux ARM64 ────────────────────────────────────────────────────
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset: memento-stub-aarch64-unknown-linux-gnu
            exe_suffix: ""
            use_cross: true

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Rust toolchain ────────────────────────────────────────────────────
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # ── cross (Linux ARM64 only) ──────────────────────────────────────────
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build (cargo)
        if: "!matrix.use_cross"
        working-directory: integrations/zed/stub
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross
        working-directory: integrations/zed/stub
        run: cross build --release --target ${{ matrix.target }}

      # ── Rename binary to final asset name ────────────────────────────────
      - name: Rename binary to asset name
        shell: bash
        run: |
          SRC="integrations/zed/target/${{ matrix.target }}/release/memento-stub${{ matrix.exe_suffix }}"
          cp "$SRC" "${{ matrix.asset }}"
          echo "Built: $(ls -lh ${{ matrix.asset }})"

      # ── Upload artefact for the upload job ───────────────────────────────
      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Upload job — creates/updates the "dev-latest" pre-release
  # ---------------------------------------------------------------------------
  upload:
    name: Upload stub binaries to dev-latest pre-release
    needs: build
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Download all artefacts ────────────────────────────────────────────
      - name: Download all artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List artefacts
        run: ls -lh dist/

      # ── Create or update the dev-latest pre-release ───────────────────────
      # We delete and recreate the tag + release so the binaries are always
      # associated with the latest dev commit. --clobber on the upload handles
      # the asset replacement, but recreating the release moves the tag to HEAD.
      - name: Delete existing dev-latest release (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete dev-latest --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push origin :refs/tags/dev-latest 2>/dev/null || true

      - name: Create dev-latest pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create dev-latest \
            --repo ${{ github.repository }} \
            --title "Dev stub binaries (rolling)" \
            --notes "Auto-updated on every dev version bump. Not for production use." \
            --prerelease \
            --latest=false \
            dist/memento-stub-x86_64-pc-windows-msvc.exe \
            dist/memento-stub-x86_64-apple-darwin \
            dist/memento-stub-aarch64-apple-darwin \
            dist/memento-stub-x86_64-unknown-linux-gnu \
            dist/memento-stub-aarch64-unknown-linux-gnu
          echo "Done."
