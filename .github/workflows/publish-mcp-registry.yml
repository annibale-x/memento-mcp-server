# .github/workflows/publish-mcp-registry.yml
name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for OIDC
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/latest/mcp-publisher_linux_amd64.tar.gz" | tar xz
          sudo mv mcp-publisher /usr/local/bin/

      - name: Update version in server.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          jq ".version = \"$VERSION\" | .packages[0].version = \"$VERSION\"" server.json > tmp.json && mv tmp.json server.json

      - name: Login using GitHub OIDC
        run: mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: mcp-publisher publish
