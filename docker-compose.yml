version: "3.8"

services:
  memorygraph:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-memento
    stdin_open: true # Required for MCP stdio
    tty: true # Required for MCP stdio
    environment:
      - CONTEXT_TOOL_PROFILE=core
      - CONTEXT_SQLITE_PATH=/data/memory.db
      - CONTEXT_LOG_LEVEL=INFO
    volumes:
      - memory_data:/data
    restart: unless-stopped

volumes:
  memory_data:
    driver: local
