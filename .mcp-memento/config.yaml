# Global Memento Configuration
# ============================
# This file contains global settings for MCP Memento.
# Applied to all projects unless overridden by project config or environment variables.
#
# Location: ~/.mcp-memento/config.yaml
# Hierarchy (highest priority last):
# 1. Default values
# 2. This file (global config)
# 3. Project config (./memento.yaml)
# 4. Environment variables
# 5. CLI arguments

# Database Configuration
# ----------------------
# Global database location
# Default: ~/.mcp-memento/context.db
sqlite_path: "~/.mcp-memento/global.db"

# Tool Configuration
# ------------------
# Global tool profile
# Options: core, extended, advanced
# Recommended: extended (balanced feature set)
tool_profile: "extended"

# Enable advanced tools globally
# Default: false
enable_advanced_tools: false

# Logging Configuration
# ---------------------
logging:
  # Global log level
  # Options: DEBUG, INFO, WARNING, ERROR
  level: "INFO"

  # Log format
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

  # Optional: Global log file
  # file: "~/.mcp-memento/memento.log"

# Feature Configuration
# ---------------------
features:
  # Global setting for relationship cycles
  # Default: false (recommended)
  allow_relationship_cycles: false

  # Full-text search global settings
  fts:
    enabled: true
    min_term_length: 2
    tolerance: "normal"

# Confidence System Configuration
# -------------------------------
confidence:
  # Global confidence settings
  default_confidence: 0.8
  decay_factor: 0.95
  validation_boost: 0.05

  # Global no-decay tags
  no_decay_tags:
    - "security"
    - "auth"
    - "api_key"
    - "password"
    - "critical"
    - "no_decay"

# User Preferences
# ----------------
user:
  # Default importance for user-created memories
  default_importance: 0.7

  # Preferred memory types
  preferred_memory_types:
    - "solution"
    - "pattern"
    - "technology"

  # Auto-tagging preferences
  auto_tags:
    - "user:${USER}"
    - "global"

  # Search preferences
  search:
    default_limit: 20
    default_order: "confidence"
    fuzzy_enabled: true

# Integration Settings
# --------------------
integrations:
  # IDE integration defaults
  ide:
    # Default profile for IDE integrations
    default_profile: "extended"

    # Auto-start with IDEs
    auto_start: true

  # CLI agent defaults
  cli_agents:
    # Default database for CLI agents
    default_db_path: "~/.mcp-memento/cli.db"

    # Default profile for CLI agents
    default_profile: "extended"

    # Auto-create database directory
    auto_create_db: true

# Maintenance Settings
# --------------------
maintenance:
  # Automatic confidence decay application
  # Default: monthly
  confidence_decay_schedule: "monthly"

  # Low confidence threshold for alerts
  low_confidence_threshold: 0.3

  # Auto-vacuum database
  auto_vacuum: true
  vacuum_interval: 86400  # 24 hours in seconds

  # Backup settings
  backup:
    enabled: true
    interval: 604800  # 7 days in seconds
    keep_backups: 5
    location: "~/.mcp-memento/backups"

# Security Settings
# -----------------
security:
  # Database encryption (if supported)
  encryption: false

  # Access logging
  access_logging: true

  # Memory validation
  validate_memory_content: true

  # Tag validation
  validate_tags: true

# Performance Settings
# --------------------
performance:
  # Connection settings
  connection_pool_size: 5
  connection_timeout: 30

  # Cache settings
  cache_enabled: true
  cache_size: 100
  cache_ttl: 3600  # 1 hour in seconds

  # Query optimization
  query_timeout: 10
  max_query_results: 1000

# Example Usage Notes
# -------------------
# 1. Project-specific overrides:
#    Create ./memento.yaml in project directory to override these settings
#
# 2. Environment variable overrides (highest priority):
#    export MEMENTO_TOOL_PROFILE="advanced"
#    export MEMENTO_LOG_LEVEL="DEBUG"
#
# 3. CLI argument overrides (highest priority):
#    memento --profile advanced --log-level DEBUG
#
# 4. Testing configuration:
#    Create test-specific config with:
#    sqlite_path: ":memory:"
#    tool_profile: "core"
#
# 5. Team shared configuration:
#    Place this file in shared location and symlink:
#    ln -s /team/shared/memento-config.yaml ~/.mcp-memento/config.yaml

# Quick Configuration Profiles
# ----------------------------
# Uncomment one of these profiles for quick setup:

# # Development Profile
# sqlite_path: "~/.mcp-memento/dev.db"
# tool_profile: "advanced"
# logging.level: "DEBUG"
# features.allow_relationship_cycles: true

# # Production Profile
# sqlite_path: "/var/lib/memento/production.db"
# tool_profile: "extended"
# logging.level: "WARNING"
# security.encryption: true

# # Minimal Profile
# sqlite_path: "~/.mcp-memento/minimal.db"
# tool_profile: "core"
# logging.level: "ERROR"
# performance.cache_enabled: false

# Notes
# -----
# - All paths support ~ expansion for home directory
# - Boolean values must be lowercase: true/false
# - Time intervals are in seconds unless specified
# - Comments start with # and can be inline
# - YAML requires consistent indentation (2 spaces recommended)
