[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mcp-context-keeper"
version = "0.1.15"
description = "MCP Context Keeper per gestione contestuale della memoria"
authors = [
    {name = "Hannibal", email = "annibale.x@gmail.com"}
]
requires-python = ">=3.10"
dependencies = [
    "mcp>=1.23.0",
    "pydantic>=2.10.0",
    "python-dotenv>=1.0.0",
    "typing-extensions>=4.0.0",
    "pyyaml>=6.0.0",
    "aiosqlite>=0.20.0"
]

[tool.setuptools.packages.find]
where = ["."]
include = ["context_keeper*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
norecursedirs = [".agent", ".data", ".pytest_cache", ".serena", "docs", "utils"]
addopts = "--asyncio-mode=auto"
